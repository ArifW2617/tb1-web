        }

        .site-header {

            padding-bottom: 32px;
            border-bottom: 1px solid #c5c4da;
        }

            margin: 0;
        }

            margin-bottom: 16px;
            font-size: 40px;
        }

            margin-bottom: 24px;
            font-size: 32px;
        }

            display: flex;
            gap: 24px;
            padding: 8px 0;
            border-top: 1px solid #c5c4da;
            border-bottom: 1px solid #c5c4da;
        }

        .nav a {
            font-size: 14px;
            font-weight: 600;
        }

        .section {
            margin-bottom: 32px;
            padding: 32px;
            background-color: #ffffff;
            outline: 1px solid #757589;
        }

        .friends-grid {
            display: grid;
            gap: 24px;
        }

        .friend-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid #c5c4da;
        }

        .friend-photo {
            width: 64px;
            height: 64px;
            object-fit: cover;
            filter: grayscale(100%);
            outline: 1px solid #757589;
        }

        .friend-name {
            margin: 0 0 4px;
            font-weight: 700;
        }

        .friend-role {
            margin: 0;
            font-size: 14px;
            color: #454557;
        }

        @media (min-width: 768px) {
            .friends-grid {
                grid-template-columns: repeat(2, 1fr);
