<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruang Pribadi Arif | Keluarga</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@100..900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f0f4f8;
      background-image:
        linear-gradient(to right, rgba(0, 1, 171, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 1, 171, 0.03) 1px, transparent 1px),
        linear-gradient(135deg, #f0f4f8 0%, #ffffff 100%);
      background-size: 20px 20px, 20px 20px, 100% 100%;
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
    }

    a {
      color: #0001ab;
      text-decoration: underline;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 48;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .site-header {
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid #c5c4da;
    }

    .page-title,
    .section-title {
      font-family: "Newsreader", serif;
      margin: 0;
    }

    .page-title {
      margin-bottom: 16px;
      font-size: 40px;
    }

    .section-title {
      margin-bottom: 24px;
      font-size: 32px;
    }

    .nav {
      display: flex;
      gap: 24px;
      padding: 8px 0;
      border-top: 1px solid #c5c4da;
      border-bottom: 1px solid #c5c4da;
    }

    .nav a {
      font-size: 14px;
      font-weight: 600;
    }

    .section {
      margin-bottom: 32px;
      padding: 32px;
      background-color: #ffffff;
      outline: 1px solid #757589;
    }

    .family-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .family-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .family-item+.family-item {
      margin-top: 16px;
    }

    .icon {
      color: #0001ab;
    }

    .name {
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <header class="site-header">
      <h1 class="page-title">Keluarga</h1>

      <nav class="nav">
        <a href="index.html">Beranda</a>
        <a href="personal.html">Data Pribadi</a>
        <a href="family.html">Keluarga</a>
        <a href="friends.html">Teman</a>
        <a href="hobbies.html">Hobi</a>
      </nav>
    </header>

    <!-- ISI -->
    <section class="section">
      <h2 class="section-title">Anggota Keluarga</h2>

      <ul class="family-list">
        <li class="family-item">
          <span class="material-symbols-outlined icon">person</span>
          <div><span class="name">Ayah</span> - Pekerjaan: Pegawai.</div>
        </li>

        <li class="family-item">
          <span class="material-symbols-outlined icon">person</span>
          <div><span class="name">Ibu</span> - Pekerjaan: Ibu Rumah Tangga.</div>
        </li>

        <li class="family-item">
          <span class="material-symbols-outlined icon">person</span>
          <div><span class="name">Saya</span> - Mahasiswa.</div>
        </li>
        <li class="family-item">
          <span class="material-symbols-outlined icon">person</span>
          <div><span class="name">Saudara</span> - Pelajar.</div>
        </li>

      </ul>
    </section>

  </div>
</body>

</html>
